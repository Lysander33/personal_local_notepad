{% extends "note/base.html" %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'note_list' %}">首页</a></li>
        <li class="breadcrumb-item active">{{ note.title }}</li>
    </ol>
</nav>

<div class="card shadow-sm">
    <div class="card-body">
        <h2 class="card-title mb-3">{{ note.title }}</h2>
        <div class="text-muted mb-4">
            <small>创建于 {{ note.created_at|date:"Y-m-d H:i:s" }}</small>
            <small class="ms-3">更新于 {{ note.updated_at|date:"Y-m-d H:i:s" }}</small>
        </div>
        <hr>
        <div class="card-text" style="white-space: pre-wrap;">{{ note.content }}</div>
    </div>
    <div class="card-footer d-flex gap-2">
        <a href="{% url 'note_update' note.pk %}" class="btn btn-warning">编辑</a>
        <a href="{% url 'note_delete' note.pk %}" class="btn btn-danger">删除</a>
        <a href="{% url 'note_list' %}" class="btn btn-outline-secondary">返回列表</a>
    </div>
</div>
{% endblock %}
