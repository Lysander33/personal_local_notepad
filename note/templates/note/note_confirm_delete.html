{% extends "note/base.html" %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'note_list' %}">首页</a></li>
        <li class="breadcrumb-item"><a href="{% url 'note_detail' note.pk %}">{{ note.title }}</a></li>
        <li class="breadcrumb-item active text-danger">删除确认</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">确认删除</h4>
            </div>
            <div class="card-body text-center">
                <p class="fs-5 mb-4">
                    确定要删除笔记<br>「<strong>{{ note.title }}</strong>」吗？
                </p>
                <p class="text-danger small">此操作不可撤销。</p>
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-danger">确认删除</button>
                        <a href="{% url 'note_detail' note.pk %}" class="btn btn-outline-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
