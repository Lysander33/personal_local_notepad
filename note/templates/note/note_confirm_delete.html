{% extends "note/base.html" %}

{% block title %}删除「{{ note.title }}」 — 个人记事本{% endblock %}

{% block content %}

<div class="confirm-container">
    <div class="confirm-card">
        <div class="confirm-icon">&#x26A0;&#xFE0F;</div>
        <h3>确认删除</h3>
        <p style="color: var(--color-text-muted); font-size: 14px; margin: 8px 0 0;">
            确定要删除笔记
        </p>
        <p class="confirm-note-title">「{{ note.title }}」</p>
        <p class="confirm-warning">此操作不可撤销</p>

        <form method="post">
            {% csrf_token %}
            <div class="confirm-actions">
                <button type="submit" class="btn btn-danger">&#x1F5D1;&#xFE0F; 确认删除</button>
                <a href="{% url 'note_detail' note.pk %}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
