{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — 个人记事本</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'note/css/style.css' %}">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            padding: 20px;
        }
        .auth-card {
            background: var(--color-surface);
            border-radius: var(--radius-xl);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 420px;
        }
        .auth-card h1 {
            font-size: 24px;
            font-weight: 650;
            letter-spacing: -0.02em;
            margin: 0 0 8px;
        }
        .auth-card .subtitle {
            color: var(--color-text-muted);
            font-size: 14px;
            margin-bottom: 28px;
        }
        .auth-card .form-group { margin-bottom: 18px; }
        .auth-card label {
            display: block;
            font-size: 13px;
            font-weight: 550;
            color: var(--color-text-muted);
            margin-bottom: 6px;
        }
        .auth-card input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: 15px;
            background: var(--color-bg);
            outline: none;
            transition: all var(--duration-fast) var(--ease-out);
        }
        .auth-card input:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(91, 140, 111, 0.12);
            background: var(--color-surface);
        }
        .auth-card .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--color-accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: all var(--duration-fast) var(--ease-out);
        }
        .auth-card .btn-submit:hover {
            background: var(--color-accent-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .auth-card .auth-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--color-text-muted);
        }
        .auth-card .auth-link a { color: var(--color-accent); font-weight: 500; }
        .auth-card .errorlist {
            list-style: none;
            padding: 0;
            margin: 4px 0 0;
            font-size: 12px;
            color: var(--color-danger);
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h1>&#x270E; 登录</h1>
        <p class="subtitle">欢迎回到个人记事本</p>

        {% if form.errors %}
            <div class="alert alert-danger" style="font-size:14px;">用户名或密码错误</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">用户名</label>
                <input type="text" name="username" id="id_username" required autofocus>
            </div>
            <div class="form-group">
                <label for="id_password">密码</label>
                <input type="password" name="password" id="id_password" required>
            </div>
            <button type="submit" class="btn-submit">登录</button>
        </form>

        <p class="auth-link">还没有账号？<a href="{% url 'register' %}">立即注册</a></p>
    </div>
</div>
</body>
</html>
